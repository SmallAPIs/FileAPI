host: 127.0.0.1
port: 8443

# Paths the agent may read/write/delete. Defaults to the user home directory.
allowed_roots:
  - /path/to/your/home

# CORS origins allowed to call the agent from a browser. Use "*" for local dev.
allowed_origins:
  - "*"

# File size limits in bytes (default: 10 MB each).
# max_read_size_bytes: 10485760
# max_write_size_bytes: 10485760

# HTTP server timeouts in seconds.
# read_timeout_seconds: 30
# write_timeout_seconds: 120
# idle_timeout_seconds: 60
# read_header_timeout_seconds: 10

# Optional overrides for generated TLS material (auto-created on first run).
# cert_file: /path/to/cert.pem
# key_file: /path/to/key.pem
