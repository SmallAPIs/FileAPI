name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go test ./...
      - run: go vet ./...

  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          NAME="fileapi-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "$GOOS" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${NAME}" \
            ./cmd/fileapi
          echo "ARTIFACT=dist/${NAME}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: fileapi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARTIFACT }}

  release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: fileapi-*
          merge-multiple: true
          path: dist
      - name: Generate checksums
        run: |
          cd dist
          sha256sum fileapi-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            dist/SHA256SUMS
