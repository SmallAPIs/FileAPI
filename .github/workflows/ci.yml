name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go test ./...
      - run: go vet ./...

  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o dist/fileapi ./cmd/fileapi
      - uses: actions/upload-artifact@v4
        with:
          name: fileapi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/fileapi
